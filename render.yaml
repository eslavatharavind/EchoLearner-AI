services:
  # Backend Web Service
  - type: web
    name: echolearner-backend
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: cd backend && chmod +x build.sh && ./build.sh
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # ----- Secrets: set the actual values in the Render dashboard -----
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY   # Optional — only needed if you switch to OpenAI LLM/TTS
        sync: false
      # ----- LLM: free Groq stack (matches local .env) -----
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: LLM_MAX_TOKENS
        value: "500"
      # ----- TTS: free Google TTS (no API key, produces mp3 directly) -----
      - key: TTS_PROVIDER
        value: gtts
      # ----- STT: smallest Whisper model to stay within free-tier RAM -----
      - key: STT_PROVIDER
        value: faster-whisper
      - key: STT_MODEL
        value: tiny
      # ----- Embeddings / Vector DB (local, no API key) -----
      - key: EMBEDDING_PROVIDER
        value: sentence-transformers
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      # ----- Allow the deployed frontend to call this API -----
      - key: CORS_ORIGINS
        value: https://echolearner-frontend.onrender.com,http://localhost:3000
      - key: HF_HUB_DISABLE_SYMLINKS_WARNING
        value: "1"
    autoDeploy: true

  # Frontend Static Site
  - type: web
    name: echolearner-frontend
    env: static
    region: oregon
    plan: free
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://echolearner-ai-scne.onrender.com
    autoDeploy: true
